<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi App Kivy</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; color: white; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        #loading { position: absolute; font-size: 20px; }
    </style>
</head>
<body>
    <div id="loading">Cargando aplicación...</div>
    <div id="canvas"></div>

    <script type="text/javascript">
        async function runKivy() {
            try {
                let pyodide = await loadPyodide();
                await pyodide.loadPackage("micropip");
                const micropip = pyodide.pyimport("micropip");
                await micropip.install("kivy");
                
                // Va a buscar tu archivo dentro de la carpeta smartstore_kivy
                let response = await fetch("./smartstore_kivy/main.py"); 
                if(!response.ok) response = await fetch("./main.py");
                
                let code = await response.text();
                document.getElementById("loading").style.display = "none";
                pyodide.runPython(code);
            } catch (err) {
                document.getElementById("loading").innerText = "Error al cargar: " + err;
            }
        }
        runKivy();
    </script>
</body>
</html>
